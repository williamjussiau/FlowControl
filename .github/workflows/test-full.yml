name: Full Tests
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
      - run: conda run -n fenics conda-develop src
      - run: conda run -n fenics pytest tests/ -m "not mpi" -q
