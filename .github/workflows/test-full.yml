name: Full Tests
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    defaults:
      run:
        shell: bash -l {0}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: "fenics"
          auto-activate: false
      - run: pip install -e . --no-deps --no-build-isolation --quiet
      - run: pytest tests/ -m "not mpi" -q
